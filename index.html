<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SceneHunt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round"><path d="M4 10h16v9a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"/><path d="M4.4 9.8 3.4 6l15.5-2.6 1.1 3.7z"/><path d="m8 9.2-.8-3M12.4 8.5l-.8-3M16.8 7.7l-.8-2.9"/></svg>
      </div>
      SceneHunt
    </div>
    <div class="topbar-right">
      <a class="btn btn-primary" href="new-project.html">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New project
      </a>
      <div id="account-slot"></div>
    </div>
  </div>

  <div class="container">
    <div class="page-head">
      <h1>Your projects</h1>
      <p>Pick up where you left off, or start hunting for a new one.</p>
    </div>

    <div class="project-grid" id="project-grid"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
