<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SceneHunt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
    <a class="logo" href="index.html">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V6.5A2.5 2.5 0 0 1 6.5 4H9"/><path d="M15 4h2.5A2.5 2.5 0 0 1 20 6.5V9"/><path d="M20 15v2.5a2.5 2.5 0 0 1-2.5 2.5H15"/><path d="M9 20H6.5A2.5 2.5 0 0 1 4 17.5V15"/><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/></svg>
      </div>
      SceneHunt
    </a>
    <div class="topbar-right">
      <a class="btn btn-ghost" href="new-project.html">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New project
      </a>
      <div id="account-slot"></div>
    </div>
  </div>

  <div class="container">
    <a class="back-link" href="index.html">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      All projects
    </a>

    <div class="workspace-head">
      <div class="workspace-title-block">
        <h1 id="project-title"></h1>
        <div class="stat-row">
          <span class="stat-pill" id="stat-duration"></span>
          <span class="stat-pill" id="stat-scenes"></span>
          <span class="stat-pill" id="stat-visuals"></span>
          <span class="stat-pill" id="stat-reused"></span>
          <span class="stat-pill" id="stat-pauses"></span>
          <span class="stat-pill stat-pill-quiet" id="stat-edited"></span>
        </div>
      </div>
      <div class="workspace-actions">
        <!-- The deliverable — the one thing a user leaves this page with, so it's the page's
             single primary action. -->
        <button class="btn btn-primary" onclick="exportLinks()">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5M4 20h16"/></svg>
          Export links
        </button>
        <!-- Practitioner switches, deliberately out of the primary flow — sensible defaults,
             flexibility one click away. -->
        <details class="options-menu" id="options-menu">
          <summary class="btn btn-ghost" aria-label="Search options">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg>
            Options
          </summary>
          <div class="options-dropdown">
            <label class="option-row" title="Skip generic Pexels stock on atmosphere scenes entirely — for a creator whose real edits never use it">
              <input type="checkbox" id="skip-stock-footage" />
              <span>
                <strong>Skip stock footage</strong>
                <small>Atmosphere scenes stay empty instead of pulling generic stock.</small>
              </span>
            </label>
            <label class="option-row" title="Evidence scenes search photos only, skipping YouTube — for testing the picture pipeline in isolation">
              <input type="checkbox" id="debug-images-only" />
              <span>
                <strong>Photos-only mode</strong>
                <small>Evidence scenes search pictures instead of footage.</small>
              </span>
            </label>
            <div class="options-divider"></div>
            <button class="option-danger" id="delete-project">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>
              Delete project
            </button>
          </div>
        </details>
      </div>
    </div>

    <div class="segment-list" id="segments"></div>
  </div>

  <!-- Preview modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) closePreview()">
    <div class="modal">
      <div class="modal-preview" id="modal-thumb">
        <span class="modal-close" onclick="closePreview()">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </span>
        <div class="modal-play" id="modal-play">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <!-- Evidence/reference preview: standard YouTube embed. Hidden for gifs/stock. -->
        <iframe id="modal-iframe" style="display:none; width:100%; height:100%; border:0;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <!-- Stock preview: plays a Pexels mp4 directly. Hidden for gifs/evidence. -->
        <video id="modal-video" controls playsinline style="display:none; width:100%; height:100%; object-fit:contain; background:#000;"></video>
      </div>
      <div class="modal-body">
        <h4 id="modal-title">Clip title</h4>
        <p id="modal-sub">source · match info</p>
        <!-- Trim (stock/Pexels only): pick any range and download just that, recorded client-side. -->
        <div class="trim-row" id="trim-row" style="display:none; align-items:center; gap:8px; flex-wrap:wrap; margin:0 0 14px;">
          <span style="font-size:12px; opacity:.65; font-family:'IBM Plex Mono',monospace;">TRIM</span>
          <input type="text" id="trim-start" placeholder="0:00" style="width:60px; padding:6px 8px; background:#0c0e11; border:1px solid #2b313b; border-radius:6px; color:inherit; font-family:'IBM Plex Mono',monospace; font-size:13px;" />
          <span style="opacity:.5;">to</span>
          <input type="text" id="trim-end" placeholder="0:10" style="width:60px; padding:6px 8px; background:#0c0e11; border:1px solid #2b313b; border-radius:6px; color:inherit; font-family:'IBM Plex Mono',monospace; font-size:13px;" />
          <button class="btn btn-dark" id="trim-preview" style="padding:6px 12px;">Preview range</button>
          <button class="btn btn-primary" id="trim-download" style="padding:6px 12px;">Download range</button>
          <span class="trim-err" id="trim-err" style="color:#ef6a5e; font-size:12px; width:100%;"></span>
        </div>
        <div class="modal-actions">
          <button class="btn btn-dark" onclick="closePreview()">Close</button>
          <a class="btn btn-primary" id="modal-download" download target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5M4 20h16"/></svg>
            Download
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
