<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClipHunt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
    <a class="logo" href="index.html">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </div>
      ClipHunt
    </a>
    <a class="btn btn-primary" href="new-project.html">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      New Project
    </a>
  </div>

  <div class="container">
    <a class="back-link" href="index.html">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      Back to Projects
    </a>

    <div class="workspace-head">
      <div>
        <h1 id="project-title"></h1>
        <span class="stat-pill" id="stat-duration"></span>
        <span class="stat-pill" id="stat-scenes"></span>
        <span class="stat-pill" id="stat-edited"></span>
      </div>
      <button class="btn btn-ghost" id="delete-project">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>
        Delete
      </button>
    </div>

    <div class="segment-list" id="segments"></div>
  </div>

  <!-- Preview modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) closePreview()">
    <div class="modal">
      <div class="modal-preview" id="modal-thumb">
        <span class="modal-close" onclick="closePreview()">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </span>
        <div class="modal-play" id="modal-play">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <!-- Evidence preview: plays only the matched excerpt via YouTube embed. Hidden for gifs. -->
        <iframe id="modal-iframe" style="display:none; width:100%; height:100%; border:0;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
      <div class="modal-body">
        <h4 id="modal-title">Clip title</h4>
        <p id="modal-sub">source · match info</p>
        <!-- Manual trim (evidence only): pick any range and download just that. Hidden for gifs. -->
        <div class="trim-row" id="trim-row" style="display:none; align-items:center; gap:8px; flex-wrap:wrap; margin:0 0 14px;">
          <span style="font-size:12px; opacity:.65; font-family:'IBM Plex Mono',monospace;">TRIM</span>
          <input type="text" id="trim-start" placeholder="0:00" style="width:60px; padding:6px 8px; background:#151512; border:1px solid #35322c; border-radius:6px; color:inherit; font-family:'IBM Plex Mono',monospace; font-size:13px;" />
          <span style="opacity:.5;">→</span>
          <input type="text" id="trim-end" placeholder="0:10" style="width:60px; padding:6px 8px; background:#151512; border:1px solid #35322c; border-radius:6px; color:inherit; font-family:'IBM Plex Mono',monospace; font-size:13px;" />
          <button class="btn btn-dark" id="trim-preview" style="padding:6px 12px;">Preview range</button>
          <button class="btn btn-primary" id="trim-download" style="padding:6px 12px;">Download range</button>
          <span class="trim-err" id="trim-err" style="color:#ff8a6a; font-size:12px; width:100%;"></span>
        </div>
        <div class="modal-actions">
          <button class="btn btn-dark" onclick="closePreview()">Skip</button>
          <a class="btn btn-ghost" id="modal-download-full" download target="_blank" rel="noopener" style="display:none;">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5M4 20h16"/></svg>
            Download full video
          </a>
          <a class="btn btn-primary" id="modal-download" download target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5M4 20h16"/></svg>
            Download
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
